[build]
  command = "npm run build"
  publish = "dist/split-wiser/browser"

[functions]
  directory = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"

# Redirect all API calls to functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA support - redirect all routes to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
