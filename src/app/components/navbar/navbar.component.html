<nav class="bg-gray-800 border-b border-gray-700">
  <div class="mx-auto max-w-7xl px-4">
    <div class="flex justify-content-between align-items-center h-4rem">
      <!-- Brand -->
      <a class="flex align-items-center text-decoration-none" routerLink="/">
        <span class="text-2xl font-bold text-cyan-400">Split-Wiser</span>
      </a>

      <!-- Mobile menu button -->
      <p-button
        (onClick)="toggleMobileMenu()"
        [text]="true"
        class="md:hidden"
        icon="pi pi-bars"
        severity="secondary">
      </p-button>

      <!-- Desktop Navigation -->
      <div class="hidden md:flex align-items-center gap-4">
        <a
          [routerLinkActiveOptions]="{exact: true}"
          class="nav-link"
          routerLink="/"
          routerLinkActive="active-link">
          <i class="pi pi-home mr-2"></i>
          Home
        </a>
        <a
          class="nav-link"
          href="https://github.com/im-ashar"
          target="_blank">
          <i class="pi pi-github mr-2"></i>
          About Me
        </a>
      </div>
    </div>

    <!-- Mobile Navigation -->
    <div [class.hidden]="!isMobileMenuOpen" class="md:hidden">
      <div class="flex flex-column gap-2 py-3 border-top-1 border-gray-600">
        <a
          (click)="closeMobileMenu()"
          [routerLinkActiveOptions]="{exact: true}"
          class="nav-link-mobile"
          routerLink="/"
          routerLinkActive="active-link">
          <i class="pi pi-home mr-2"></i>
          Home
        </a>
        <a
          (click)="closeMobileMenu()"
          class="nav-link-mobile"
          href="https://github.com/im-ashar"
          target="_blank">
          <i class="pi pi-github mr-2"></i>
          About Me
        </a>
      </div>
    </div>
  </div>
</nav>
